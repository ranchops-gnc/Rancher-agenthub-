services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub
    ports:
      - "5432:5432"
    volumes:
      - agenthub-postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./runtime/artifacts:/data/artifacts

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "agenthub.worker"]
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./runtime/artifacts:/data/artifacts

volumes:
  agenthub-postgres:
